<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Blocked</title>
  <link rel="stylesheet" href="blocked.css" />
</head>
<body>
  <main class="box">
    <img id="blockedImage" class="blockedImage" alt="Blocked" />
    <h1>Blocked</h1>
    <p>This site is not available in the active mode.</p>
    <p id="site" class="site"></p>

    <div class="panel">
      <div class="label">Time left</div>
      <div id="timer" class="timer">00:00:00</div>
    </div>

    <p class="small">This page stays until the lock expires or the extension is removed.</p>
  </main>

  <script src="blocked.js"></script>
</body>
</html>
