<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Blocked - Whitelist Lock</title>
  <link rel="stylesheet" href="blocked.css">
</head>
<body>
  <div class="blocked-container">
    <div class="blocked-message">
      <h1>Blocked</h1>
      <p class="reason">This site is not allowed while the lock is active.</p>
      <div class="url-container">
        <span class="url-label">Attempted access:</span>
        <span class="blocked-url" id="blockedUrl">-</span>
      </div>
      <div class="timer-container">
        <span class="timer-label">Lock expires in:</span>
        <span class="timer" id="timer">--:--:--</span>
      </div>
      <button class="retry-btn" id="retryBtn">Check Again</button>
    </div>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
