<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 200px; padding: 10px; font-family: sans-serif; }
    input { width: 100%; }
    label { font-size: 12px; }
  </style>
</head>
<body>
  <h3>Video Squisher</h3>
  <label>Width Scale: <span id="val">1.0</span></label>
  <input type="range" id="scale" min="0.2" max="1.5" step="0.05" value="1">
  <button id="reset" style="margin-top:10px; width:100%;">Reset</button>

  <script src="popup.js"></script>
</body>
</html>
